name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      - name: Browser script syntax
        run: |
          node --check src/server/public/freshness-ui.js
          node --check src/server/public/shipment-report-ui.js
          node --check src/server/public/shipment-email-ui.js
          node --check src/server/public/shipment-update-ui.js
          node --check src/server/public/shipment-actions-ui.js
          node --check src/server/public/progressive-disclosure-ui.js
          node --check src/server/public/trucking-estimate-ui.js
          node --check src/server/public/drayage-estimate-ui.js
          node --check src/server/public/trucking-ingestion-ui.js
          node --check src/server/public/drayage-ingestion-ui.js
          node --check src/server/public/usability-shell.js

      - name: Install browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser workflow smoke tests
        run: pnpm exec playwright test

      - name: TypeScript build
        run: pnpm build